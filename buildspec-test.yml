# All commands below are run from root directory of repository by CodeBuild
version: 0.2

env:
  variables:
    TF_VAR_region: "ap-southeast-2"
    TF_VAR_name: "buildpipeline-test"
    TF_VAR_kms_key_arns: '["arn:aws:kms:ap-southeast-2:352311918919:key/8d3ffdfd-3292-42d5-a74c-d4ba45921eed"]'
    TF_VAR_ssm_parameter_arns: '["arn:aws:ssm:ap-southeast-2:352311918919:parameter/buildpipeline/*"]'
    TF_VAR_build_docker_image: "352311918919.dkr.ecr.ap-southeast-2.amazonaws.com/docker-node-terraform-aws"
    TF_VAR_build_docker_tag: "22.x"
    TF_VAR_buildspec: "buildspec-test.yml"
    TF_VAR_github_repository_owner: "jch254"
    TF_VAR_github_repository_name: "buildpipeline"
    TF_VAR_github_branch_name: "master"
    TF_VAR_dns_name: "buildpipeline--test.603.nz"
    TF_VAR_acm_arn: "arn:aws:acm:us-east-1:352311918919:certificate/11734027-bace-4fa2-979c-030bef887db6"
    TF_VAR_cache_bucket: "jch254-codebuild-cache/buildpipeline-test"
    TF_VAR_github_connection_arn: "arn:aws:codeconnections:ap-southeast-2:352311918919:connection/a3ff3fde-ba43-4c0e-9486-16e9b5f11de1"
    TF_VAR_cloudflare_zone_id: "692b2307a53fc5837e75ee5558cb0ebf"
    REMOTE_STATE_BUCKET: "jch254-terraform-remote-state"
    REMOTE_STATE_REGION: "ap-southeast-4"
    DEPLOY_ENV: "test"
  parameter-store:
    CLOUDFLARE_API_TOKEN: "/buildpipeline/cloudflare-api-token"
    APP_SECRET: "/buildpipeline/app-secret-test"

phases:
  install:
    commands:
      # Note: Docker Hub authentication handled at CodeBuild service level, not in buildspec
      - echo "Build environment ready - using jch254/docker-node-terraform-aws:22.x"
      # Restore execute permissions on bash scripts (CodePipeline doesn't preserve them)
      - find ./infrastructure -name "*.bash" -exec chmod +x {} \;
      - ./infrastructure/install.bash

  pre_build:
    commands:
      - export APP_VERSION=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}

  build:
    commands:
      - ./infrastructure/build-artifacts.bash
      - ./infrastructure/run-tests.bash
      - ./infrastructure/deploy-infrastructure.bash
      - ./infrastructure/upload-artifacts.bash
      - ./infrastructure/archive-artifacts.bash

cache:
   paths:
     - 'infrastructure/.terraform/plugins/**/*'
     - '/usr/local/share/.cache/yarn/v1/**/*'